name: Railway PostgreSQL Backup

on:
    schedule:
        # Ejecutar todos los domingos a las 2 AM UTC (11 PM Sábado Argentina)
        - cron: "0 2 * * 0"
    workflow_dispatch: # Permite ejecutar manualmente

jobs:
    backup:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install PostgreSQL Client
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client

            - name: Create Backup
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
              run: |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  pg_dump "$DATABASE_URL" | gzip > backup_production_$TIMESTAMP.sql.gz
                  ls -lh backup_*.sql.gz

            - name: Upload Backup to Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: postgres-backup-${{ github.run_number }}
                  path: backup_*.sql.gz
                  retention-days: 90 # Guardar por 90 días (backups semanales)
